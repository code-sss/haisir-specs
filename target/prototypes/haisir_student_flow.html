<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hAIsir – Student (Target)</title>
<style>
/* ─── RESET & BASE ──────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans','Segoe UI',sans-serif;font-size:13px;background:#F7F6F2;min-height:100vh;}
button{cursor:pointer;font-family:inherit;}
input,textarea{font-family:inherit;}

/* ─── SCREEN SYSTEM ─────────────────────────────────────── */
.screen{display:none;flex-direction:column;min-height:100vh;}
.screen.active{display:flex;}

/* ─── SHELL ─────────────────────────────────────────────── */
.shell{max-width:1020px;margin:0 auto;width:100%;flex:1;display:flex;flex-direction:column;}

/* ─── TOPBAR ─────────────────────────────────────────────── */
.topbar{background:#0A1F5C;padding:0 20px;display:flex;align-items:center;height:46px;gap:12px;flex-shrink:0;}
.tb-brand{color:#fff;font-size:15px;font-weight:700;letter-spacing:-.3px;}
.tb-role{font-size:10px;padding:3px 9px;border-radius:20px;background:rgba(55,138,221,.3);color:#90C4F0;font-weight:700;text-transform:uppercase;letter-spacing:.05em;}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.tb-avatar{width:28px;height:28px;border-radius:50%;background:#378ADD;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;}
.tb-back{font-size:11px;padding:4px 10px;border-radius:5px;background:rgba(255,255,255,.1);color:rgba(255,255,255,.8);border:none;}
.tb-back:hover{background:rgba(255,255,255,.2);color:#fff;}

/* ─── BREADCRUMB ─────────────────────────────────────────── */
.bc{background:#fff;border-bottom:0.5px solid #e5e3dc;padding:8px 20px;font-size:11px;color:#888780;display:flex;align-items:center;gap:6px;flex-shrink:0;}
.bc-link{color:#185FA5;cursor:pointer;}
.bc-link:hover{text-decoration:underline;}
.bc-sep{color:#d3d1c7;}
.bc-cur{color:#1a1a18;font-weight:500;}

/* ─── HOME BODY ──────────────────────────────────────────── */
.home-body{padding:20px;display:flex;flex-direction:column;gap:24px;flex:1;}
.greeting{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.greet-name{font-size:20px;font-weight:600;color:#1a1a18;margin-bottom:3px;}
.greet-sub{font-size:12px;color:#888780;}
.btn-profile{font-size:11px;padding:6px 14px;border-radius:6px;background:#fff;border:0.5px solid #d3d1c7;color:#5f5e5a;}
.btn-profile:hover{background:#f5f4f0;}

/* ─── SECTION HEADER ─────────────────────────────────────── */
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.sec-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#b4b2a9;}
.sec-title-hs{color:#0F6E56;}

/* ─── PLATFORM COURSE CARDS ──────────────────────────────── */
.course-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;}
.course-card{background:#fff;border:0.5px solid #e5e3dc;border-top:2.5px solid #185FA5;border-radius:12px;padding:16px;cursor:pointer;transition:border-color .15s,box-shadow .15s;}
.course-card:hover{box-shadow:0 2px 8px rgba(24,95,165,.1);}
.cc-head{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;}
.cc-icon{width:34px;height:34px;border-radius:8px;background:#E6F1FB;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.cc-info{flex:1;min-width:0;}
.cc-name{font-size:13px;font-weight:600;color:#1a1a18;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cc-meta{font-size:11px;color:#888780;}
.prog-row{display:flex;justify-content:space-between;font-size:11px;color:#888780;margin-bottom:4px;margin-top:8px;}
.ptrack{background:#e5e3dc;border-radius:4px;height:5px;}
.pfill-p{background:#185FA5;border-radius:4px;height:5px;}
.pfill-hs{background:#1D9E75;border-radius:4px;height:5px;}
.cc-footer{margin-top:10px;display:flex;gap:7px;}
.btn-resume{font-size:11px;padding:6px 14px;border-radius:6px;background:#185FA5;color:#fff;border:none;font-weight:500;flex:1;}
.btn-resume:hover{opacity:.88;}
.btn-ghost{font-size:11px;padding:6px 10px;border-radius:6px;border:0.5px solid #d3d1c7;background:transparent;color:#5f5e5a;}

/* ─── HOME STUDY SECTION ─────────────────────────────────── */
.hs-section{background:#F0FDF7;border:0.5px solid #9FE1CB;border-radius:14px;padding:16px;}
.hs-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;}
.hs-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#0F6E56;margin-bottom:3px;}
.hs-source{font-size:12px;color:#5f5e5a;}
.hs-source strong{color:#0F6E56;}
.hs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;}
.hs-card{background:#fff;border:0.5px solid #9FE1CB;border-top:2.5px solid #1D9E75;border-radius:10px;padding:14px;cursor:pointer;transition:box-shadow .15s;}
.hs-card:hover{box-shadow:0 2px 8px rgba(29,158,117,.1);}
.hsc-icon{width:32px;height:32px;border-radius:7px;background:#E1F5EE;display:flex;align-items:center;justify-content:center;font-size:15px;margin-bottom:8px;}
.hsc-name{font-size:12px;font-weight:600;color:#1a1a18;margin-bottom:3px;}
.hsc-meta{font-size:11px;color:#888780;margin-bottom:6px;}
.hsc-prog-row{display:flex;justify-content:space-between;font-size:11px;color:#888780;margin-bottom:4px;}
.btn-hs{font-size:11px;padding:6px 14px;border-radius:6px;background:#1D9E75;color:#fff;border:none;font-weight:500;width:100%;margin-top:8px;}
.btn-hs:hover{background:#0F6E56;}

/* ─── PAGE TABS (nav screen) ─────────────────────────────── */
.page-tabs{display:flex;border-bottom:0.5px solid #e5e3dc;background:#fff;padding:0 20px;flex-shrink:0;}
.ptab{font-size:12px;padding:9px 16px;border-bottom:2px solid transparent;border-top:none;border-left:none;border-right:none;background:none;color:#888780;cursor:pointer;font-weight:500;}
.ptab.on-p{color:#185FA5;border-bottom-color:#185FA5;}
.ptab.on-hs{color:#0F6E56;border-bottom-color:#1D9E75;}
.ptab-badge{font-size:10px;padding:1px 5px;border-radius:20px;background:#E1F5EE;color:#085041;margin-left:4px;}

/* ─── TOPIC NAVIGATOR ────────────────────────────────────── */
.nav-layout{display:flex;flex:1;overflow:hidden;min-height:0;}
.nav-tree{width:220px;min-width:220px;background:#fff;border-right:0.5px solid #e5e3dc;display:flex;flex-direction:column;overflow-y:auto;}
.nt-head{padding:10px 13px;border-bottom:0.5px solid #e5e3dc;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#b4b2a9;flex-shrink:0;}
.nt-node{padding:7px 13px;display:flex;align-items:center;gap:8px;cursor:pointer;transition:background .1s;border-left:2.5px solid transparent;}
.nt-node:hover{background:#f5f4f0;}
.nt-node.sel-p{background:#f4f8fd;border-left-color:#185FA5;}
.nt-node.sel-hs{background:#f0fdf7;border-left-color:#1D9E75;}
.nt-icon{font-size:12px;flex-shrink:0;}
.nt-label{font-size:12px;color:#5f5e5a;}
.nt-node.sel-p .nt-label{color:#185FA5;font-weight:500;}
.nt-node.sel-hs .nt-label{color:#0F6E56;font-weight:500;}
.nt-child{padding-left:30px;}
.nt-section{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#b4b2a9;padding:10px 13px 4px;}

.nav-main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.nav-main-header{background:#fff;border-bottom:0.5px solid #e5e3dc;padding:9px 13px;font-size:12px;font-weight:600;color:#1a1a18;flex-shrink:0;}
.topic-list{flex:1;overflow-y:auto;padding:10px 13px;display:flex;flex-direction:column;gap:6px;}
.topic-row{background:#fff;border:0.5px solid #e5e3dc;border-radius:8px;padding:10px 12px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:border-color .12s;}
.topic-row:hover{border-color:#378ADD;}
.tr-icon{width:28px;height:28px;border-radius:5px;background:#E6F1FB;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;}
.tr-icon-hs{background:#E1F5EE;}
.tr-main{flex:1;min-width:0;}
.tr-title{font-size:12px;font-weight:500;color:#1a1a18;margin-bottom:2px;}
.tr-meta{font-size:10px;color:#888780;}
.tr-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.tbadge{font-size:10px;padding:2px 6px;border-radius:20px;font-weight:500;white-space:nowrap;}
.tb-done{background:#E1F5EE;color:#085041;}
.tb-prog{background:#FAEEDA;color:#633806;}
.tb-new{background:#F1EFE8;color:#5F5E5A;}
.start-btn{font-size:10px;padding:3px 9px;border-radius:5px;background:#185FA5;color:#fff;border:none;font-weight:500;}
.start-btn-hs{background:#1D9E75;}
.start-btn:hover{opacity:.85;}
.topic-empty{padding:40px 20px;text-align:center;color:#888780;font-size:12px;}

/* ─── EXAM FLOW ──────────────────────────────────────────── */
.exam-source-bar{padding:6px 20px;font-size:11px;display:flex;align-items:center;gap:6px;border-bottom:0.5px solid #e5e3dc;flex-shrink:0;}
.esb-p{background:#EBF4FD;color:#185FA5;}
.esb-hs{background:#E1F5EE;color:#085041;}
.esb-tag{font-size:10px;padding:1px 7px;border-radius:20px;font-weight:600;}
.esb-name{color:#5f5e5a;}
.exam-hdr{background:#fff;border-bottom:0.5px solid #e5e3dc;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.exam-title{font-size:14px;font-weight:600;color:#1a1a18;}
.exam-meta{font-size:11px;color:#888780;margin-top:2px;}
.exam-timer{font-size:18px;font-weight:700;color:#D85A30;font-variant-numeric:tabular-nums;}
.exam-body{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:12px;}
.q-card{background:#fff;border:0.5px solid #e5e3dc;border-radius:10px;padding:14px 16px;}
.q-num{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#b4b2a9;margin-bottom:6px;}
.q-text{font-size:13px;color:#1a1a18;line-height:1.6;margin-bottom:12px;}
.q-options{display:flex;flex-direction:column;gap:6px;}
.q-opt{display:flex;align-items:center;gap:10px;padding:9px 12px;border:0.5px solid #d3d1c7;border-radius:7px;cursor:pointer;font-size:12px;color:#5f5e5a;transition:all .12s;}
.q-opt:hover{border-color:#378ADD;background:#f4f8fd;}
.q-opt.sel-p{border-color:#185FA5;background:#E6F1FB;color:#0C447C;font-weight:500;}
.q-opt.sel-hs{border-color:#1D9E75;background:#E1F5EE;color:#085041;font-weight:500;}
.q-bubble{width:20px;height:20px;border-radius:50%;border:1.5px solid #d3d1c7;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
.q-opt.sel-p .q-bubble{background:#185FA5;border-color:#185FA5;color:#fff;}
.q-opt.sel-hs .q-bubble{background:#1D9E75;border-color:#1D9E75;color:#fff;}
.exam-footer{background:#fff;border-top:0.5px solid #e5e3dc;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.exam-prog-text{font-size:11px;color:#888780;}
.btn-submit{font-size:13px;padding:9px 24px;border-radius:8px;background:#185FA5;color:#fff;border:none;font-weight:600;}
.btn-submit-hs{background:#1D9E75;}
.btn-submit:hover{opacity:.88;}

/* ─── EXAM RESULTS ───────────────────────────────────────── */
.result-banner{padding:24px 20px;text-align:center;background:#0A1F5C;flex-shrink:0;}
.rb-score{font-size:52px;font-weight:700;color:#FAC775;line-height:1;}
.rb-pct{font-size:16px;color:rgba(255,255,255,.5);margin-top:4px;}
.rb-topic{font-size:12px;color:rgba(255,255,255,.4);margin-top:3px;}
.result-body{padding:16px 20px;display:flex;flex-direction:column;gap:14px;flex:1;overflow-y:auto;}
.result-stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.result-stat{background:#fff;border:0.5px solid #e5e3dc;border-radius:10px;padding:12px;text-align:center;}
.rs-val{font-size:20px;font-weight:700;color:#1a1a18;}
.rs-lbl{font-size:10px;color:#888780;margin-top:3px;}
.rq-list{display:flex;flex-direction:column;gap:7px;}
.rq-row{background:#fff;border:0.5px solid #e5e3dc;border-radius:8px;padding:10px 13px;display:flex;align-items:flex-start;gap:10px;}
.rq-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0;margin-top:1px;}
.rqn-c{background:#1D9E75;}
.rqn-w{background:#D85A30;}
.rq-text{flex:1;font-size:12px;color:#1a1a18;line-height:1.5;}
.rq-result{font-size:11px;font-weight:600;flex-shrink:0;margin-top:1px;}
.rqr-c{color:#0F6E56;}
.rqr-w{color:#993C1D;}
.btn-back-home{font-size:13px;padding:10px 24px;border-radius:8px;background:#0A1F5C;color:#fff;border:none;font-weight:600;width:100%;}

/* ─── STUDENT PROFILE ────────────────────────────────────── */
.profile-page{padding:20px;display:flex;flex-direction:column;gap:16px;flex:1;}
.prof-header{background:#0A1F5C;border-radius:14px;padding:20px;display:flex;align-items:center;gap:16px;}
.prof-av{width:54px;height:54px;border-radius:50%;background:#378ADD;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff;flex-shrink:0;}
.prof-name{font-size:18px;font-weight:600;color:#fff;margin-bottom:3px;}
.prof-email{font-size:12px;color:rgba(255,255,255,.5);}
.section-card{background:#fff;border:0.5px solid #e5e3dc;border-radius:12px;overflow:hidden;}
.sc-header{padding:12px 16px;border-bottom:0.5px solid #e5e3dc;display:flex;align-items:center;justify-content:space-between;}
.sc-title{font-size:12px;font-weight:600;color:#1a1a18;}
.parent-code-box{background:#F7F6F2;border-radius:8px;padding:14px;display:flex;flex-direction:column;gap:8px;margin:14px 16px;}
.pc-label{font-size:11px;color:#888780;}
.pc-code{font-size:26px;font-weight:700;color:#0A1F5C;letter-spacing:.15em;}
.pc-actions{display:flex;gap:7px;}
.pc-btn{font-size:11px;padding:6px 12px;border-radius:6px;background:#185FA5;color:#fff;border:none;font-weight:500;}
.pc-btn-ghost{background:transparent;border:0.5px solid #d3d1c7;color:#5f5e5a;}
.pc-expiry{font-size:10px;color:#b4b2a9;}
.linked-parent-row{display:flex;align-items:center;gap:12px;padding:12px 16px;}
.lp-av{width:34px;height:34px;border-radius:50%;background:#BA7517;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;}
.lp-name{font-size:13px;font-weight:500;color:#1a1a18;}
.lp-meta{font-size:11px;color:#888780;margin-top:1px;}
.lp-status{font-size:10px;padding:2px 7px;border-radius:20px;background:#E1F5EE;color:#085041;font-weight:600;margin-left:auto;white-space:nowrap;}
.no-parent{padding:16px;font-size:12px;color:#888780;text-align:center;}

/* ─── TOAST ──────────────────────────────────────────────── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a18;color:#fff;font-size:12px;padding:10px 18px;border-radius:8px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;}
</style>
</head>

<!-- ══ SCREEN 4: RESULTS ════════════════════════════════════ -->
<div class="screen" id="s-results">
  <div class="shell">
    <div class="topbar">

</div>

  chapters: [

/* ════════════════════════════════════════════════
   STATE
════════════════════════════════════════════════ */
let activeNavSource = 'platform'; // 'platform' | 'hs'
let activeChapterId = null;
let activeExam = null;
let examAnswers = {};
let examTimerInterval = null;
let examSecondsLeft = 0;

/* ════════════════════════════════════════════════
   ROUTING
════════════════════════════════════════════════ */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}
function goHome() { renderHome(); showScreen('s-home'); }
function goProfile() { renderProfile(); showScreen('s-profile'); }

/* ════════════════════════════════════════════════
   HOME
════════════════════════════════════════════════ */
function renderHome() {
  const platformCards = platformCourses.map(c => `
    <div class="course-card" onclick="openNav('platform','${c.id}')">
      <div class="cc-head">
        <div class="cc-icon">${c.icon}</div>
        <div class="cc-info">
          <div class="cc-name">${c.name}</div>
          <div class="cc-meta">${c.board} · ${c.done}/${c.topics} topics done</div>
        </div>
      </div>
      <div class="prog-row"><span>Progress</span><span>${c.progress}%</span></div>
      <div class="ptrack"><div class="pfill-p" style="width:${c.progress}%"></div></div>
      <div class="cc-footer">
        <button class="btn-resume" onclick="event.stopPropagation();openNav('platform','${c.id}')">Continue</button>
      </div>
    </div>`).join('');

  const hsCards = homeStudyCurriculum.chapters.map(ch => {
    const done = ch.topics.filter(t => t.status === 'done').length;
    const pct = Math.round(done / ch.topics.length * 100);
    return `
      <div class="hs-card" onclick="openNav('hs',null,'${ch.id}')">
        <div class="hsc-icon">${ch.icon}</div>
        <div class="hsc-name">${ch.label}</div>
        <div class="hsc-meta">${done}/${ch.topics.length} topics done</div>
        <div class="hsc-prog-row"><span>Progress</span><span>${pct}%</span></div>
        <div class="ptrack"><div class="pfill-hs" style="width:${pct}%"></div></div>
        <button class="btn-hs" onclick="event.stopPropagation();openNav('hs',null,'${ch.id}')">Study</button>
      </div>`;
  }).join('');

  document.getElementById('home-body').innerHTML = `
    <div class="greeting">
      <div>
        <div class="greet-name">Hello, ${student.name.split(' ')[0]} 👋</div>
        <div class="greet-sub">Grade ${student.grade} · Pick up where you left off</div>
      </div>
      <button class="btn-profile" onclick="goProfile()">My profile</button>
    </div>

    <div>
      <div class="sec-hd"><span class="sec-title">Platform content</span></div>
      <div class="course-grid">${platformCards}</div>
    </div>

    <div class="hs-section">
      <div class="hs-header">
        <div>
          <div class="hs-label">Home Study</div>
          <div class="hs-source">Prepared by <strong>${homeStudyCurriculum.parentName}</strong> · private to you</div>
        </div>
        <button class="btn-ghost" onclick="openNav('hs')">View all</button>
      </div>
      <div class="hs-grid">${hsCards}</div>
    </div>`;
}

/* ════════════════════════════════════════════════
   TOPIC NAVIGATOR
════════════════════════════════════════════════ */
function openNav(source, courseId, chapterId) {
  activeNavSource = source || 'platform';
  activeChapterId = chapterId || null;
  renderNav();
  showScreen('s-nav');
}

function renderNav() {
  const isHS = activeNavSource === 'hs';

  // Source tabs
  document.getElementById('nav-source-tabs').innerHTML = `
    <button class="ptab ${!isHS ? 'on-p' : ''}" onclick="switchNavSource('platform')">Platform content</button>
    <button class="ptab ${isHS ? 'on-hs' : ''}" onclick="switchNavSource('hs')">
      Home Study <span class="ptab-badge">from Meena</span>
    </button>`;

  document.getElementById('nav-bc-cur').textContent = isHS ? 'Home Study' : 'Platform Topics';

  // Tree
  const chapters = isHS ? homeStudyCurriculum.chapters : platformCourses.flatMap(c => c.chapters);
  if (!activeChapterId && chapters.length) activeChapterId = chapters[0].id;

  let treeHtml = `<div class="nt-head">${isHS ? 'Your Modules' : 'Chapters'}</div>`;

  if (!isHS) {
    platformCourses.forEach(c => {
      treeHtml += `<div class="nt-section">${c.name.replace('NCERT ','').replace(' — Grade 6','')}</div>`;
      c.chapters.forEach(ch => {
        const sel = ch.id === activeChapterId;
        treeHtml += `<div class="nt-node ${sel ? 'sel-p' : ''}" onclick="selectChapter('${ch.id}')">
          <span class="nt-icon">${ch.icon}</span><span class="nt-label">${ch.label}</span></div>`;
      });
    });
  } else {
    homeStudyCurriculum.chapters.forEach(ch => {
      const sel = ch.id === activeChapterId;
      treeHtml += `<div class="nt-node ${sel ? 'sel-hs' : ''}" onclick="selectChapter('${ch.id}')">
        <span class="nt-icon">${ch.icon}</span><span class="nt-label">${ch.label}</span></div>`;
    });
  }
  document.getElementById('nav-tree').innerHTML = treeHtml;

  renderTopicList();
}

function switchNavSource(src) {
  activeNavSource = src;
  activeChapterId = null;
  renderNav();
}

function selectChapter(id) {
  activeChapterId = id;
  renderNav();
}

function renderTopicList() {
  const isHS = activeNavSource === 'hs';
  const chapters = isHS ? homeStudyCurriculum.chapters : platformCourses.flatMap(c => c.chapters);
  const ch = chapters.find(c => c.id === activeChapterId);

  document.getElementById('nav-main-header').textContent = ch ? ch.label : 'Select a chapter';

  if (!ch) { document.getElementById('topic-list').innerHTML = '<div class="topic-empty">Select a chapter from the left to see topics.</div>'; return; }

  const statusMap = { done: ['tb-done', 'Done'], prog: ['tb-prog', 'In progress'], new: ['tb-new', 'Not started'] };
  const html = ch.topics.map(t => {
    const [cls, label] = statusMap[t.status];
    const isH = t.type === 'hs';
    const hasExam = t.exams > 0;
    return `
      <div class="topic-row">
        <div class="tr-icon ${isH ? 'tr-icon-hs' : ''}">${ch.icon}</div>
        <div class="tr-main">
          <div class="tr-title">${t.name}</div>
          <div class="tr-meta">${hasExam ? t.exams + ' exam' + (t.exams > 1 ? 's' : '') + ' available' : 'No exams yet'}</div>
        </div>
        <div class="tr-right">
          <span class="tbadge ${cls}">${label}</span>
          ${hasExam ? `<button class="start-btn ${isH ? 'start-btn-hs' : ''}" onclick="startExam('${t.type === 'hs' ? 'hs' : 'platform'}')">Take exam</button>` : ''}
        </div>
      </div>`;
  }).join('');
  document.getElementById('topic-list').innerHTML = html || '<div class="topic-empty">No topics yet.</div>';
}

/* ════════════════════════════════════════════════
   EXAM
════════════════════════════════════════════════ */
function startExam(source) {
  activeExam = examTemplate[source] || examTemplate.platform;
  examAnswers = {};
  examSecondsLeft = activeExam.minutes * 60;
  renderExam();
  showScreen('s-exam');
  startTimer();
}

function renderExam() {
  const ex = activeExam;
  const isHS = ex.source === 'hs';

  document.getElementById('exam-source-bar').className = 'exam-source-bar ' + (isHS ? 'esb-hs' : 'esb-p');
  document.getElementById('exam-source-bar').innerHTML =
    `<span class="esb-tag" style="background:${isHS?'#0F6E56':'#185FA5'};color:#fff">${isHS ? 'Home Study' : 'Platform'}</span>
     <span class="esb-name">${ex.sourceLabel}</span>`;
  document.getElementById('exam-title').textContent = ex.title;
  document.getElementById('exam-meta').textContent = `${ex.questions.length} questions · ${ex.minutes} min`;

  const selClass = isHS ? 'sel-hs' : 'sel-p';
  const html = ex.questions.map((q, i) => `
    <div class="q-card">
      <div class="q-num">Question ${i + 1} of ${ex.questions.length}</div>
      <div class="q-text">${q.text}</div>
      <div class="q-options">
        ${q.options.map(opt => `
          <div class="q-opt ${examAnswers[q.id] === opt ? selClass : ''}" onclick="selectAnswer(${q.id},'${opt}',this,${q.id})">
            <div class="q-bubble">${String.fromCharCode(64 + q.options.indexOf(opt) + 1)}</div>
            ${opt}
          </div>`).join('')}
      </div>
    </div>`).join('');

  document.getElementById('exam-body').innerHTML = html;
  document.getElementById('exam-submit-btn').className = 'btn-submit' + (isHS ? ' btn-submit-hs' : '');
  updateExamProg();
}

function selectAnswer(qId, opt, el, questionId) {
  examAnswers[qId] = opt;
  const card = el.closest('.q-card');
  const isHS = activeExam.source === 'hs';
  card.querySelectorAll('.q-opt').forEach(o => o.classList.remove('sel-p','sel-hs'));
  el.classList.add(isHS ? 'sel-hs' : 'sel-p');
  updateExamProg();
}

function updateExamProg() {
  const answered = Object.keys(examAnswers).length;
  const total = activeExam.questions.length;
  document.getElementById('exam-prog-text').textContent = `${answered} of ${total} answered`;
}

function startTimer() {
  clearInterval(examTimerInterval);
  examTimerInterval = setInterval(() => {
    examSecondsLeft--;
    const m = Math.floor(examSecondsLeft / 60).toString().padStart(2,'0');
    const s = (examSecondsLeft % 60).toString().padStart(2,'0');
    document.getElementById('exam-timer').textContent = `${m}:${s}`;
    if (examSecondsLeft <= 0) { clearInterval(examTimerInterval); submitExam(); }
  }, 1000);
}

function submitExam() {
  clearInterval(examTimerInterval);
  const ex = activeExam;
  const isHS = ex.source === 'hs';
  let correct = 0;
  ex.questions.forEach(q => { if (examAnswers[q.id] === q.answer) correct++; });
  const pct = Math.round(correct / ex.questions.length * 100);

  document.getElementById('result-banner').style.background = isHS ? '#085041' : '#0A1F5C';
  document.getElementById('result-banner').innerHTML = `
    <div class="rb-score">${pct}%</div>
    <div class="rb-pct">${correct} / ${ex.questions.length} correct</div>
    <div class="rb-topic">${ex.title} · ${ex.sourceLabel}</div>`;

  const rqList = ex.questions.map(q => {
    const isCorrect = examAnswers[q.id] === q.answer;
    const cls = isCorrect ? 'rqn-c' : 'rqn-w';
    const rcls = isCorrect ? 'rqr-c' : 'rqr-w';
    const rText = isCorrect ? 'Correct' : `Wrong — ${q.answer}`;
    return `<div class="rq-row">
      <div class="rq-num ${cls}">${q.id}</div>
      <div class="rq-text">${q.text}</div>
      <div class="rq-result ${rcls}">${rText}</div>
    </div>`;
  }).join('');

  document.getElementById('result-body').innerHTML = `
    <div class="result-stat-row">
      <div class="result-stat"><div class="rs-val">${correct}</div><div class="rs-lbl">Correct</div></div>
      <div class="result-stat"><div class="rs-val">${ex.questions.length - correct}</div><div class="rs-lbl">Wrong</div></div>
      <div class="result-stat"><div class="rs-val">${pct}%</div><div class="rs-lbl">Score</div></div>
    </div>
    <div class="sec-hd" style="padding:0;"><span class="sec-title">Question breakdown</span></div>
    <div class="rq-list">${rqList}</div>
    <button class="btn-back-home" onclick="goHome()">Back to home</button>`;

  showScreen('s-results');
}

/* ════════════════════════════════════════════════
   PROFILE
════════════════════════════════════════════════ */
function renderProfile() {
  const parentsHtml = linkedParents.length
    ? linkedParents.map(p => `
        <div class="linked-parent-row">
          <div class="lp-av">${p.initials}</div>
          <div>
            <div class="lp-name">${p.name}</div>
            <div class="lp-meta">${p.relation} · ${p.since}</div>
          </div>
          <span class="lp-status">Linked</span>
        </div>`).join('')
    : '<div class="no-parent">No parent linked yet. Share your code below.</div>';

  document.getElementById('profile-page').innerHTML = `
    <div class="prof-header">
      <div class="prof-av">AR</div>
      <div>
        <div class="prof-name">${student.name}</div>
        <div class="prof-email">${student.email} · Grade ${student.grade}</div>
      </div>
    </div>

    <div class="section-card">
      <div class="sc-header">
        <span class="sc-title">Linked parents</span>
      </div>
      ${parentsHtml}
    </div>

    <div class="section-card">
      <div class="sc-header">
        <span class="sc-title">Your parent link code</span>
      </div>
      <div class="parent-code-box">
        <div class="pc-label">Share this code with your parent so they can link to you.</div>
        <div class="pc-code">${student.linkCode}</div>
        <div class="pc-actions">
          <button class="pc-btn" onclick="showToast('Code copied!')">Copy code</button>
          <button class="pc-btn pc-btn-ghost" onclick="showToast('New code generated')">New code</button>
        </div>
        <div class="pc-expiry">${student.codeExpiry}</div>
      </div>
    </div>`;
}

/* ════════════════════════════════════════════════
   TOAST
════════════════════════════════════════════════ */
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

/* ════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════ */
renderHome();
</script>

</html>
