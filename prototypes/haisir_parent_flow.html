<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hAIsir – Parent Flow</title>
<style>
/* ─── RESET ─────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans','Segoe UI',sans-serif;font-size:13px;background:#F7F6F2;min-height:100vh;}
button{cursor:pointer;font-family:inherit;}
input,textarea,select{font-family:inherit;}

/* ─── SCREEN SYSTEM ─────────────────────────────────── */
.screen{display:none;flex-direction:column;min-height:100vh;}
.screen.active{display:flex;}

/* ─── SHELL ─────────────────────────────────────────── */
.shell{max-width:860px;margin:0 auto;width:100%;flex:1;display:flex;flex-direction:column;}

/* ─── TOPBAR — warm amber-brown for parent persona ──── */
.topbar{background:#3D2000;padding:0 20px;display:flex;align-items:center;height:46px;gap:12px;flex-shrink:0;}
.tb-brand{color:#fff;font-size:15px;font-weight:700;letter-spacing:-.3px;}
.tb-role{font-size:10px;padding:3px 9px;border-radius:20px;background:rgba(255,200,80,.2);color:#FAC775;font-weight:700;text-transform:uppercase;letter-spacing:.05em;}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.tb-avatar{width:28px;height:28px;border-radius:50%;background:#BA7517;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;}
.tb-back{font-size:11px;padding:4px 10px;border-radius:5px;background:rgba(255,255,255,.1);color:rgba(255,255,255,.75);border:none;}
.tb-back:hover{background:rgba(255,255,255,.18);color:#fff;}
.tb-btn{font-size:11px;padding:5px 12px;border-radius:6px;background:rgba(255,255,255,.1);color:#fff;border:none;font-weight:500;}
.tb-btn:hover{background:rgba(255,255,255,.18);}

/* ─── CHILD SWITCHER STRIP ───────────────────────────── */
.child-strip{background:#fff;border-bottom:0.5px solid #e5e3dc;padding:0 20px;display:flex;align-items:stretch;gap:0;flex-shrink:0;}
.child-tab{display:flex;align-items:center;gap:8px;padding:9px 16px;border-bottom:2px solid transparent;border-top:none;border-left:none;border-right:none;background:none;cursor:pointer;transition:background .12s;flex-shrink:0;white-space:nowrap;}
.child-tab:hover{background:#faf8f5;}
.child-tab.active{border-bottom-color:#BA7517;background:#fdf8f2;}
.ch-av{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0;}
.ch-name{font-size:12px;font-weight:500;color:#5f5e5a;line-height:1.3;}
.ch-sub{font-size:10px;color:#b4b2a9;}
.child-tab.active .ch-name{color:#854F0B;}
.child-tab.active .ch-sub{color:#BA7517;}
.ch-div{width:0.5px;background:#e5e3dc;margin:8px 2px;flex-shrink:0;}
.add-child-btn{font-size:11px;color:#b4b2a9;background:none;border:none;padding:0 14px;align-self:center;flex-shrink:0;white-space:nowrap;}
.add-child-btn:hover{color:#BA7517;}

/* ─── BREADCRUMB ─────────────────────────────────────── */
.bc{background:#fff;border-bottom:0.5px solid #e5e3dc;padding:7px 20px;font-size:11px;color:#888780;display:flex;align-items:center;gap:6px;flex-shrink:0;}
.bc-link{color:#854F0B;cursor:pointer;}
.bc-link:hover{text-decoration:underline;}
.bc-sep{color:#d3d1c7;}
.bc-cur{color:#1a1a18;font-weight:500;}

/* ─── MAIN NAV TABS ──────────────────────────────────── */
.main-tabs{background:#fff;border-bottom:0.5px solid #e5e3dc;padding:0 20px;display:flex;flex-shrink:0;}
.mtab{font-size:12px;padding:10px 14px;border-bottom:2.5px solid transparent;border-top:none;border-left:none;border-right:none;background:none;color:#888780;cursor:pointer;font-weight:500;display:flex;align-items:center;gap:6px;}
.mtab:hover{color:#1a1a18;}
.mtab.on{color:#3D2000;border-bottom-color:#BA7517;}
.mtab-badge{font-size:9px;padding:1px 5px;border-radius:20px;background:#FAEEDA;color:#854F0B;font-weight:700;}

/* ─── PAGE BODY ──────────────────────────────────────── */
.page-body{padding:20px;flex:1;display:flex;flex-direction:column;gap:18px;}

/* ─── SECTION HEADER ─────────────────────────────────── */
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.sec-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#b4b2a9;}
.sec-btn{font-size:11px;padding:5px 12px;border-radius:6px;background:#3D2000;color:#fff;border:none;font-weight:500;}
.sec-btn:hover{background:#5c3000;}
.sec-btn-outline{background:transparent;border:0.5px solid #d3d1c7;color:#5f5e5a;}
.sec-btn-outline:hover{background:#f5f4f0;}

/* ─── WEEKLY SNAPSHOT ────────────────────────────────── */
.snapshot{background:#3D2000;border-radius:14px;padding:18px 20px;color:#fff;}
.snap-greeting{font-size:18px;font-weight:600;margin-bottom:4px;}
.snap-sub{font-size:12px;color:rgba(255,255,255,.55);margin-bottom:14px;}
.snap-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.snap-stat{background:rgba(255,255,255,.08);border-radius:8px;padding:10px 12px;text-align:center;}
.snap-val{font-size:20px;font-weight:700;color:#FAC775;margin-bottom:2px;}
.snap-lbl{font-size:10px;color:rgba(255,255,255,.5);}

/* ─── STATUS BANNER ──────────────────────────────────── */
.status-banner{border-radius:10px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.sb-ok{background:#E1F5EE;border:0.5px solid #9FE1CB;}
.sb-warn{background:#FAEEDA;border:0.5px solid #FAC775;}
.sb-danger{background:#FAECE7;border:0.5px solid #F5C4B3;}
.sb-text{font-size:12px;font-weight:500;}
.sb-ok .sb-text{color:#085041;}
.sb-warn .sb-text{color:#633806;}
.sb-danger .sb-text{color:#712B13;}
.sb-sub{font-size:11px;margin-top:2px;}
.sb-ok .sb-sub{color:#0F6E56;}
.sb-warn .sb-sub{color:#854F0B;}
.sb-danger .sb-sub{color:#993C1D;}
.sb-action{font-size:11px;padding:5px 12px;border-radius:6px;border:none;font-weight:500;white-space:nowrap;flex-shrink:0;}
.sb-ok .sb-action{background:#1D9E75;color:#fff;}
.sb-warn .sb-action{background:#EF9F27;color:#fff;}
.sb-danger .sb-action{background:#D85A30;color:#fff;}

/* ─── COURSE PROGRESS CARDS ──────────────────────────── */
.course-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;}
.course-card{background:#fff;border:0.5px solid #e5e3dc;border-radius:12px;padding:16px;cursor:pointer;transition:border-color .15s,box-shadow .15s;}
.course-card:hover{border-color:#BA7517;box-shadow:0 2px 8px rgba(186,117,23,.1);}
.course-card.c-struct{border-top:2.5px solid #185FA5;}
.course-card.c-open{border-top:2.5px solid #534AB7;}
.cc-head{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;}
.cc-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.cc-icon-s{background:#E6F1FB;}
.cc-icon-o{background:#EEEDFE;}
.cc-info{flex:1;min-width:0;}
.cc-name{font-size:13px;font-weight:600;color:#1a1a18;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cc-meta{font-size:11px;color:#888780;}
.track-pill{font-size:10px;padding:1px 7px;border-radius:20px;font-weight:600;flex-shrink:0;}
.tp-s{background:#E6F1FB;color:#185FA5;}
.tp-o{background:#EEEDFE;color:#534AB7;}
.prog-row{display:flex;justify-content:space-between;font-size:11px;color:#888780;margin-bottom:4px;}
.ptrack{background:#e5e3dc;border-radius:4px;height:5px;margin-bottom:8px;}
.pfill{border-radius:4px;height:5px;}
.pfill-ok{background:#1D9E75;}
.pfill-warn{background:#EF9F27;}
.pfill-bad{background:#D85A30;}
.cc-alerts{display:flex;flex-direction:column;gap:4px;margin-bottom:8px;}
.cc-alert{font-size:11px;padding:4px 8px;border-radius:5px;display:flex;align-items:center;gap:5px;}
.ca-warn{background:#FAECE7;color:#712B13;}
.ca-ok{background:#E1F5EE;color:#085041;}
.ca-amber{background:#FAEEDA;color:#633806;}
.cc-footer{display:flex;gap:7px;}
.btn-amber{font-size:11px;padding:6px 14px;border-radius:6px;background:#BA7517;color:#fff;border:none;font-weight:500;flex:1;}
.btn-amber:hover{background:#854F0B;}
.btn-ghost{font-size:11px;padding:6px 10px;border-radius:6px;border:0.5px solid #d3d1c7;background:transparent;color:#5f5e5a;}
.btn-ghost:hover{background:#f5f4f0;}

/* ─── DUE ITEMS ──────────────────────────────────────── */
.due-strip{background:#fff;border:0.5px solid #FAC775;border-left:3px solid #EF9F27;border-radius:10px;padding:12px 16px;}
.due-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#854F0B;margin-bottom:8px;}
.due-item{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:0.5px solid #f0efe9;font-size:12px;}
.due-item:last-child{border-bottom:none;}
.due-name{color:#1a1a18;font-weight:500;margin-bottom:1px;}
.due-src{font-size:11px;color:#888780;}
.due-badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500;white-space:nowrap;}
.db-tmr{background:#FAECE7;color:#712B13;}
.db-soon{background:#FAEEDA;color:#633806;}
.db-done{background:#E1F5EE;color:#085041;}

/* ─── PROGRESS DETAIL ────────────────────────────────── */
.progress-layout{display:flex;gap:16px;}
.progress-main{flex:1;min-width:0;display:flex;flex-direction:column;gap:12px;}
.progress-side{width:240px;flex-shrink:0;display:flex;flex-direction:column;gap:12px;}

.subject-card{background:#fff;border:0.5px solid #e5e3dc;border-radius:12px;overflow:hidden;}
.subject-header{padding:12px 16px;border-bottom:0.5px solid #e5e3dc;display:flex;align-items:center;justify-content:space-between;}
.sh-left{display:flex;align-items:center;gap:10px;}
.sh-icon{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.sh-name{font-size:13px;font-weight:600;color:#1a1a18;}
.sh-meta{font-size:11px;color:#888780;margin-top:1px;}
.sh-score{font-size:18px;font-weight:700;}
.topic-row{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;border-bottom:0.5px solid #f0efe9;}
.topic-row:last-child{border-bottom:none;}
.tr-name{font-size:12px;color:#1a1a18;}
.tr-plain{font-size:11px;color:#888780;margin-top:2px;}
.tr-right{display:flex;align-items:center;gap:8px;}
.mastery-badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500;white-space:nowrap;}
.mb-good{background:#E1F5EE;color:#085041;}
.mb-ok{background:#FAEEDA;color:#633806;}
.mb-low{background:#FAECE7;color:#712B13;}
.mb-new{background:#F1EFE8;color:#5F5E5A;}
.ask-ai-btn{font-size:10px;padding:3px 8px;border-radius:5px;background:#FAEEDA;color:#633806;border:0.5px solid #FAC775;white-space:nowrap;}
.ask-ai-btn:hover{background:#BA7517;color:#fff;border-color:#BA7517;}

/* ─── ACTIVITY TIMELINE ──────────────────────────────── */
.timeline-card{background:#fff;border:0.5px solid #e5e3dc;border-radius:12px;overflow:hidden;}
.tl-header{padding:12px 14px;border-bottom:0.5px solid #e5e3dc;}
.tl-title{font-size:12px;font-weight:600;color:#1a1a18;}
.tl-item{display:flex;gap:12px;padding:10px 14px;border-bottom:0.5px solid #f0efe9;}
.tl-item:last-child{border-bottom:none;}
.tl-dot-col{display:flex;flex-direction:column;align-items:center;gap:0;padding-top:3px;}
.tl-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.tl-line{width:1px;background:#e5e3dc;flex:1;min-height:12px;}
.tl-content{flex:1;}
.tl-text{font-size:12px;color:#1a1a18;line-height:1.5;margin-bottom:2px;}
.tl-time{font-size:10px;color:#b4b2a9;}
.tl-dot-ok{background:#1D9E75;}
.tl-dot-warn{background:#EF9F27;}
.tl-dot-info{background:#378ADD;}
.tl-dot-study{background:#BA7517;}
.tl-dot-teacher{background:#0F6E56;}

/* ─── AI SUMMARY CARD ────────────────────────────────── */
.ai-summary{background:#fff;border:0.5px solid #FAC775;border-radius:12px;overflow:hidden;}
.ais-header{background:#3D2000;padding:12px 14px;display:flex;align-items:center;gap:8px;}
.ais-av{width:26px;height:26px;border-radius:50%;background:#BA7517;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;}
.ais-title{font-size:13px;font-weight:600;color:#fff;}
.ais-sub{font-size:10px;color:rgba(255,255,255,.5);}
.ais-body{padding:14px;}
.ais-text{font-size:12px;color:#3d3d3a;line-height:1.7;margin-bottom:10px;}
.ais-actions{display:flex;gap:6px;flex-wrap:wrap;}
.ais-btn{font-size:11px;padding:5px 10px;border-radius:6px;background:#FAEEDA;color:#633806;border:0.5px solid #FAC775;}
.ais-btn:hover{background:#BA7517;color:#fff;border-color:#BA7517;}

/* ─── ASSESSMENT TIMELINE ────────────────────────────── */
.assess-timeline{display:flex;flex-direction:column;gap:8px;}
.at-item{background:#fff;border:0.5px solid #e5e3dc;border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:14px;}
.at-item.at-upcoming{border-left:3px solid #EF9F27;}
.at-item.at-done{border-left:3px solid #1D9E75;}
.at-item.at-poor{border-left:3px solid #D85A30;}
.at-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.at-main{flex:1;min-width:0;}
.at-name{font-size:13px;font-weight:500;color:#1a1a18;margin-bottom:3px;}
.at-meta{font-size:11px;color:#888780;}
.at-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;}
.score-big{font-size:20px;font-weight:700;}
.score-good{color:#0F6E56;}
.score-ok{color:#854F0B;}
.score-poor{color:#993C1D;}
.trend{font-size:11px;font-weight:500;}
.trend-up{color:#0F6E56;}
.trend-dn{color:#993C1D;}
.trend-flat{color:#888780;}

/* ─── TEACHERS CARD ──────────────────────────────────── */
.teacher-card{background:#fff;border:0.5px solid #e5e3dc;border-radius:12px;padding:14px 16px;display:flex;flex-direction:column;gap:10px;}
.tc-person{display:flex;align-items:center;gap:12px;}
.tc-av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;flex-shrink:0;}
.tc-name{font-size:14px;font-weight:600;color:#1a1a18;margin-bottom:2px;}
.tc-role{font-size:11px;color:#888780;}
.tc-type{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600;flex-shrink:0;}
.tct-inst{background:#E6F1FB;color:#185FA5;}
.tct-tutor{background:#EEEDFE;color:#534AB7;}
.tc-detail{font-size:12px;color:#5f5e5a;display:flex;flex-direction:column;gap:4px;}
.tc-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:0.5px solid #f0efe9;}
.tc-row:last-child{border-bottom:none;}
.tc-label{color:#888780;}
.tc-val{color:#1a1a18;font-weight:500;}
.tc-footer{display:flex;gap:7px;}
.msg-thread{display:flex;flex-direction:column;gap:6px;margin-top:6px;}
.msg-bubble{max-width:90%;border-radius:10px;padding:9px 12px;font-size:12px;line-height:1.5;}
.msg-parent{background:#FAEEDA;color:#3d3d3a;border-bottom-right-radius:3px;align-self:flex-end;}
.msg-tutor{background:#f5f4f0;color:#3d3d3a;border-bottom-left-radius:3px;align-self:flex-start;}
.msg-time{font-size:10px;color:#b4b2a9;margin-top:2px;}
.msg-input-row{display:flex;gap:8px;margin-top:8px;}
.msg-input{flex:1;font-size:12px;border:0.5px solid #d3d1c7;border-radius:6px;padding:7px 10px;background:#fafaf8;color:#1a1a18;outline:none;}
.msg-input:focus{border-color:#BA7517;}
.msg-send{background:#BA7517;border:none;border-radius:6px;padding:7px 14px;color:#fff;font-size:12px;font-weight:500;}

/* ─── LINK CHILD (onboarding) ────────────────────────── */
.onboard-body{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;}
.onboard-card{background:#fff;border:0.5px solid #e5e3dc;border-radius:16px;padding:32px;width:100%;max-width:420px;display:flex;flex-direction:column;gap:16px;align-items:center;text-align:center;}
.ob-icon{font-size:42px;margin-bottom:4px;}
.ob-title{font-size:20px;font-weight:700;color:#3D2000;}
.ob-sub{font-size:13px;color:#888780;line-height:1.6;max-width:320px;}
.ob-input-wrap{width:100%;text-align:left;}
.ob-label{font-size:11px;font-weight:600;color:#5f5e5a;margin-bottom:6px;display:block;}
.ob-input{width:100%;font-size:16px;font-weight:600;border:1.5px solid #d3d1c7;border-radius:8px;padding:12px 16px;background:#fafaf8;color:#3D2000;outline:none;text-align:center;letter-spacing:.1em;}
.ob-input:focus{border-color:#BA7517;}
.ob-msg{font-size:12px;padding:8px 12px;border-radius:6px;width:100%;}
.ob-msg-ok{background:#E1F5EE;color:#085041;}
.ob-msg-err{background:#FAECE7;color:#712B13;}
.ob-btn{width:100%;font-size:14px;padding:12px;border-radius:8px;background:#3D2000;color:#fff;border:none;font-weight:700;}
.ob-btn:hover{background:#5c3000;}
.ob-btn:disabled{background:#b4b2a9;}
.ob-divider{display:flex;align-items:center;gap:10px;width:100%;font-size:11px;color:#b4b2a9;}
.ob-line{flex:1;height:0.5px;background:#e5e3dc;}
.ob-how{font-size:11px;color:#888780;line-height:1.6;background:#f5f4f0;border-radius:8px;padding:12px 14px;text-align:left;width:100%;}

/* ─── REPORT BANNER ──────────────────────────────────── */
.report-banner{background:#fff;border:0.5px solid #e5e3dc;border-radius:12px;padding:16px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;}
.rb-left{}
.rb-title{font-size:13px;font-weight:600;color:#1a1a18;margin-bottom:3px;}
.rb-sub{font-size:11px;color:#888780;}
.rb-actions{display:flex;gap:8px;}

/* ─── TOAST ──────────────────────────────────────────── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#3D2000;color:#fff;font-size:12px;padding:10px 18px;border-radius:8px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<!-- ══ SCREEN 1: HOME DASHBOARD ═══════════════════════════ -->
<div class="screen active" id="s-home">
  <div class="shell">
    <div class="topbar">
      <span class="tb-brand">hAIsir</span>
      <span class="tb-role">Parent</span>
      <div class="tb-right">
        <button class="tb-btn" onclick="goLink()">+ Link child</button>
        <div class="tb-avatar">MP</div>
      </div>
    </div>
    <div class="child-strip" id="home-child-strip"></div>
    <div class="main-tabs">
      <button class="mtab on"  onclick="switchHomeTab('overview',this)">Overview</button>
      <button class="mtab"     onclick="switchHomeTab('progress',this)">Progress</button>
      <button class="mtab"     onclick="switchHomeTab('assessments',this)">Assessments</button>
      <button class="mtab"     onclick="switchHomeTab('teachers',this)">Teachers &amp; tutors</button>
    </div>
    <div class="page-body" id="home-body"></div>
  </div>
</div>

<!-- ══ SCREEN 2: LINK CHILD ═══════════════════════════════ -->
<div class="screen" id="s-link">
  <div class="shell">
    <div class="topbar">
      <button class="tb-back" onclick="goHome()">← Back</button>
      <span class="tb-brand">hAIsir</span>
      <span class="tb-role">Parent</span>
      <div class="tb-right"><div class="tb-avatar">MP</div></div>
    </div>
    <div class="onboard-body" id="link-body"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════
   DATA
═══════════════════════════════════════════════════ */
const parent = { name:'Meena Patel', initials:'MP' };

const children = [
  {
    id:'c1', name:'Arjun', surname:'Patel', initials:'AP', color:'#378ADD', grade:'6',
    streak:5, topicsThisWeek:4, activeCoursesCount:4, overallStatus:'warn',
    courses:[
      {

let activeChildId = 'c1';
let activeHomeTab = 'overview';

/* ═══════════════════════════════════════════════════
   ROUTING
═══════════════════════════════════════════════════ */
function goHome()  { renderHome(); goScreen('s-home'); }
function goLink()  { renderLink(); goScreen('s-link'); }
function goScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

/* ═══════════════════════════════════════════════════
   CHILD STRIP
═══════════════════════════════════════════════════ */
function buildChildStrip(stripId) {
  const el = document.getElementById(stripId);
  if (!el) return;
  let html = '';
  children.forEach((c,i) => {
    const isA = c.id === activeChildId;
    if (i) html += '<div class="ch-div"></div>';
    html += `
      <button class="child-tab ${isA?'active':''}" onclick="selectChild('${c.id}')">
        <div class="ch-av" style="background:${c.color}">${c.initials}</div>
        <div>
          <div class="ch-name">${c.name}</div>
          <div class="ch-sub">Grade ${c.grade}</div>
        </div>
      </button>`;
  });
  html += '<div class="ch-div"></div><button class="add-child-btn" onclick="goLink()">+ Link child</button>';
  el.innerHTML = html;
}

function selectChild(id) {
  activeChildId = id;
  buildChildStrip('home-child-strip');
  renderCurrentTab();
}

/* ═══════════════════════════════════════════════════
   MAIN TAB SWITCH
═══════════════════════════════════════════════════ */
function switchHomeTab(tab, btn) {
  activeHomeTab = tab;
  document.querySelectorAll('.mtab').forEach(b=>b.classList.remove('on'));
  if (btn) btn.classList.add('on');
  renderCurrentTab();
}

function renderCurrentTab() {
  const tabs = {overview:renderOverview, progress:renderProgress, assessments:renderAssessments, teachers:renderTeachers};
  if (tabs[activeHomeTab]) tabs[activeHomeTab]();
}

/* ═══════════════════════════════════════════════════
   TAB 1 — OVERVIEW
═══════════════════════════════════════════════════ */
function renderOverview() {
  const child = children.find(c=>c.id===activeChildId);
  const allDue = child.courses.flatMap(e=>(e.dueItems||[]).map(d=>({text:d,source:e.name,type:e.type})));
  const weakCount = child.courses.reduce((a,e)=>a+(e.weakTopics?.length||0),0);

  const statusConf = {
    ok:     {cls:'sb-ok',     icon:'✓', text:`${child.name} is on track this week`, sub:'Consistent activity across all courses'},
    warn:   {cls:'sb-warn',   icon:'⚠', text:`${child.name} needs some attention`,  sub:`${weakCount} weak topic${weakCount>1?'s':''} detected across courses`},
    danger: {cls:'sb-danger', icon:'⚠', text:`${child.name} needs urgent attention`,sub:'Significant gaps — consider scheduling extra sessions'},
  };
  const sc = statusConf[child.overallStatus];

  const courseCards = child.courses.map(e=>{
    const isS = e.type==='struct';
    const pColor = e.progress>=75?'pfill-ok':e.progress>=50?'pfill-warn':'pfill-bad';
    const topLine = isS ? e.institution : (e.tutor==='Self'?'Self-directed':e.tutor);
    const alerts = [
      e.weakTopics?.length ? `<div class="cc-alert ca-warn">⚠ Struggles with: ${e.weakTopics.join(', ')}</div>` : '',
      e.dueItems?.length   ? `<div class="cc-alert ca-amber">📅 ${e.dueItems[0]}</div>` : '',
      e.nextSession        ? `<div class="cc-alert ca-ok">📌 Next session: ${e.nextSession}</div>` : '',
      !e.weakTopics?.length && !e.dueItems?.length && !e.nextSession
        ? `<div class="cc-alert ca-ok">✓ All good — no issues flagged</div>` : '',
    ].join('');
    return `
      <div class="course-card ${isS?'c-struct':'c-open'}">
        <div class="cc-head">
          <div class="cc-icon ${isS?'cc-icon-s':'cc-icon-o'}">${e.icon}</div>
          <div class="cc-info">
            <div class="cc-name">${e.name}</div>
            <div class="cc-meta">${topLine} · Grade ${child.grade}</div>
          </div>
          <span class="track-pill ${isS?'tp-s':'tp-o'}">${isS?'School':'Open'}</span>
        </div>
        <div class="prog-row"><span>${e.subjects?.length||0} topics</span><span>${e.progress}%</span></div>
        <div class="ptrack"><div class="pfill ${pColor}" style="width:${e.progress}%"></div></div>
        <div class="cc-alerts">${alerts}</div>
        <div class="cc-footer" onclick="event.stopPropagation()">
          <button class="btn-amber" onclick="switchHomeTab('progress',null)">View progress</button>
          <button class="btn-ghost">Last: ${e.lastStudied}</button>
        </div>
      </div>`;
  }).join('');

  document.getElementById('home-body').innerHTML = `
    <div class="snapshot">
      <div class="snap-greeting">Good morning, ${parent.name.split(' ')[0]}</div>
      <div class="snap-sub">${child.name}'s week at a glance</div>
      <div class="snap-stats">
        <div class="snap-stat"><div class="snap-val">${child.streak}</div><div class="snap-lbl">Day streak</div></div>
        <div class="snap-stat"><div class="snap-val">${child.topicsThisWeek}</div><div class="snap-lbl">Topics this week</div></div>
        <div class="snap-stat"><div class="snap-val">${child.activeCoursesCount}</div><div class="snap-lbl">Active courses</div></div>
        <div class="snap-stat"><div class="snap-val">${weakCount>0?weakCount:'0'}</div><div class="snap-lbl">Need attention</div></div>
      </div>
    </div>

    <div class="status-banner ${sc.cls}">
      <div>
        <div class="sb-text">${sc.icon} ${sc.text}</div>
        <div class="sb-sub">${sc.sub}</div>
      </div>
      <button class="sb-action" onclick="switchHomeTab('progress',null)">${child.overallStatus==='ok'?'See details':'View weak topics'}</button>
    </div>

    ${allDue.length ? `
      <div>
        <div class="sec-hd"><span class="sec-title">Due soon</span></div>
        <div class="due-strip">
          <div class="due-title">Upcoming for ${child.name}</div>
          ${allDue.map(d=>`
            <div class="due-item">
              <div><div class="due-name">${d.text.split('—')[0].trim()}</div><div class="due-src">${d.source}</div></div>
              <span class="due-badge ${d.text.includes('Tomorrow')?'db-tmr':'db-soon'}">${d.text.split('—')[1]?.trim()||'Upcoming'}</span>
            </div>`).join('')}
        </div>
      </div>` : ''}

    <div>
      <div class="sec-hd"><span class="sec-title">All courses</span></div>
      <div class="course-grid">${courseCards}</div>
    </div>

    <div class="report-banner">
      <div class="rb-left">
        <div class="rb-title">Weekly report</div>
        <div class="rb-sub">A plain-language summary of ${child.name}'s progress is sent every Monday.</div>
      </div>
      <div class="rb-actions">
        <button class="btn-ghost" onclick="showToast('Opening last week\'s report…')">View last report</button>
        <button class="btn-amber" onclick="showToast('Generating report now…')">Get report now</button>
      </div>
    </div>`;
}

          ${child.name} is active across ${child.activeCoursesCount} courses this week with a ${child.streak}-day study streak — great consistency.
          ${child.courses.filter(e=>e.weakTopics?.length).length>0
            ? `The main areas needing attention are <strong>${[...new Set(child.courses.flatMap(e=>e.weakTopics||[]))].join(' and ')}</strong>. These are topics where ${child.name} has scored below 60% in recent attempts. A focused session with their tutor or some extra practice should help.`
            : `No major gaps detected this week. ${child.name} is performing well across all subjects.`}

        </div>
        <div class="ais-actions">
          <button class="ais-btn" onclick="showToast('Generating detailed report…')">Full progress report</button>
          <button class="ais-btn" onclick="showToast('Tips for supporting ${child.name} at home…')">How can I help at home?</button>
          <button class="ais-btn" onclick="switchHomeTab('teachers',null)">Talk to a tutor</button>
        </div>
      </div>
    </div>`;

  const timeline = `
    <div class="timeline-card">
      <div class="tl-header"><div class="tl-title">Recent activity</div></div>

    <div class="progress-layout">
      <div class="progress-main">${subjectCards}</div>

/* ═══════════════════════════════════════════════════
   TAB 3 — ASSESSMENTS
═══════════════════════════════════════════════════ */
function renderAssessments() {
  const child = children.find(c=>c.id===activeChildId);
  const completed = child.assessments.filter(a=>a.status!=='upcoming');
  const upcoming  = child.assessments.filter(a=>a.status==='upcoming');

  const avgScore = Math.round(completed.reduce((a,t)=>a+(t.score||0),0)/completed.length);
  const improving = completed.filter(a=>a.trend==='up').length;

  const itemHtml = (a) => {
    const borderCls = a.status==='upcoming'?'at-upcoming':a.score>=70?'at-done':'at-poor';
    const scoreColor = a.score>=75?'score-good':a.score>=60?'score-ok':'score-poor';
    const trendHtml = a.trend==='up'?`<span class="trend trend-up">↑ Improving</span>`:
                      a.trend==='dn'?`<span class="trend trend-dn">↓ Dropped</span>`:
                      a.trend==='flat'?`<span class="trend trend-flat">→ Steady</span>`:'';
    const iconBg = a.status==='upcoming'?'#FAEEDA':a.score>=70?'#E1F5EE':'#FAECE7';
    return `
      <div class="at-item ${borderCls}">
        <div class="at-icon" style="background:${iconBg}">${a.icon}</div>
        <div class="at-main">
          <div class="at-name">${a.name}</div>
          <div class="at-meta">${a.course} · ${a.date}</div>
        </div>
        <div class="at-right">
          ${a.status==='upcoming'
            ? `<span style="font-size:12px;font-weight:600;color:#854F0B;">Coming up</span>`
            : `<div class="${scoreColor}" style="font-size:20px;font-weight:700;">${a.score}%</div>`}
          ${trendHtml}
        </div>
      </div>`;
  };

  document.getElementById('home-body').innerHTML = `
    <div class="stat-row" style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;">
      <div style="background:#fff;border:0.5px solid #e5e3dc;border-radius:10px;padding:14px 16px;">
        <div style="font-size:22px;font-weight:700;color:${avgScore>=70?'#0F6E56':avgScore>=55?'#854F0B':'#993C1D'}">${avgScore}%</div>
        <div style="font-size:11px;color:#888780;margin-top:3px;">Average score</div>
      </div>
      <div style="background:#fff;border:0.5px solid #e5e3dc;border-radius:10px;padding:14px 16px;">
        <div style="font-size:22px;font-weight:700;color:#0F6E56;">${improving}</div>
        <div style="font-size:11px;color:#888780;margin-top:3px;">Improving topics</div>
      </div>
      <div style="background:#fff;border:0.5px solid #e5e3dc;border-radius:10px;padding:14px 16px;">
        <div style="font-size:22px;font-weight:700;color:#854F0B;">${upcoming.length}</div>
        <div style="font-size:11px;color:#888780;margin-top:3px;">Upcoming</div>
      </div>
    </div>

    ${upcoming.length ? `
      <div>
        <div class="sec-hd"><span class="sec-title">Coming up</span></div>
        <div class="assess-timeline">${upcoming.map(itemHtml).join('')}</div>
      </div>` : ''}

    <div>
      <div class="sec-hd"><span class="sec-title">Past assessments</span></div>
      <div class="assess-timeline">${completed.map(itemHtml).join('')}</div>
    </div>

    <div style="background:#E6F1FB;border:0.5px solid #B5D4F4;border-radius:10px;padding:12px 16px;font-size:12px;color:#0C447C;">
      ℹ Scores are provided by ${child.name}'s teachers and institution. For detailed question-level feedback, ask their teacher directly.
    </div>`;
}

/* ═══════════════════════════════════════════════════
   TAB 4 — TEACHERS & TUTORS
═══════════════════════════════════════════════════ */
function renderTeachers() {
  const child = children.find(c=>c.id===activeChildId);

  const teacherHtml = child.teachers.map(t=>{
    const isTutor = t.type==='tutor';
    const detailRows = isTutor
      ? [
          {label:'Next session', val:t.nextSession||'Not scheduled'},
          {label:'Rate',         val:t.rate||'—'},
          {label:'Covering',     val:t.topicsCovering.join(', ')},
        ]
      : [
          {label:'Class',        val:t.class},
          {label:'Institution',  val:t.institution},
          {label:'Contact',      val:t.contact},
          {label:'Covering',     val:t.topicsCovering.join(', ')},
        ];

    const msgThread = isTutor ? `
      <div style="border-top:0.5px solid #e5e3dc;padding-top:10px;margin-top:2px;">
        <div style="font-size:11px;font-weight:600;color:#888780;margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em;">Message thread</div>
        <div class="msg-thread">
          ${t.messages.map(m=>`
            <div>
              <div class="msg-bubble ${m.from==='parent'?'msg-parent':'msg-tutor'}">${m.text}</div>
              <div class="msg-time" style="text-align:${m.from==='parent'?'right':'left'}">${m.from==='parent'?'You':'${t.name}'} · ${m.time}</div>
            </div>`).join('')}
        </div>
        <div class="msg-input-row">
          <input class="msg-input" type="text" placeholder="Message ${t.name}…" id="msg-${t.id}" />
          <button class="msg-send" onclick="sendMsg('${t.id}','${t.name}')">Send</button>
        </div>
      </div>` : `
      <div style="background:#f5f4f0;border-radius:7px;padding:10px;font-size:11px;color:#888780;margin-top:2px;">
        ℹ To contact ${t.name}, please reach out through ${t.institution}.
      </div>`;

    return `
      <div class="teacher-card">
        <div class="tc-person">
          <div class="tc-av" style="background:${t.color}">${t.initials}</div>
          <div style="flex:1;">
            <div class="tc-name">${t.name}</div>
            <div class="tc-role">${t.role}</div>
          </div>
          <span class="tc-type ${isTutor?'tct-tutor':'tct-inst'}">${isTutor?'Tutor':'School'}</span>
        </div>
        <div class="tc-detail">
          ${detailRows.map(r=>`
            <div class="tc-row">
              <span class="tc-label">${r.label}</span>
              <span class="tc-val">${r.val}</span>
            </div>`).join('')}
        </div>
        ${msgThread}
        ${isTutor ? `
          <div class="tc-footer">
            <button class="btn-amber" onclick="showToast('Opening session booking…')">Book a session</button>
            <button class="btn-ghost" onclick="showToast('Viewing ${t.name}\'s profile…')">View profile</button>
          </div>` : ''}
      </div>`;
  }).join('');

  document.getElementById('home-body').innerHTML = `
    <div class="sec-hd"><span class="sec-title">Teaching ${child.name}</span></div>
    ${teacherHtml}
    <div style="background:#EEEDFE;border:0.5px solid #CECBF6;border-radius:10px;padding:14px 16px;">
      <div style="font-size:12px;font-weight:600;color:#3C3489;margin-bottom:4px;">Need extra support?</div>
      <div style="font-size:12px;color:#534AB7;margin-bottom:10px;">Browse independent tutors who specialise in ${child.name}'s weak topics.</div>
      <button style="font-size:12px;padding:7px 16px;border-radius:7px;background:#534AB7;color:#fff;border:none;font-weight:500;" onclick="showToast('Opening tutor marketplace…')">Browse tutors</button>
    </div>`;
}

/* ═══════════════════════════════════════════════════
   SCREEN 2 — LINK CHILD
═══════════════════════════════════════════════════ */
const VALID_CODES = {'ARJUN-2026': {name:'Arjun Patel', grade:'6', school:"St. Mary's"}};
let linkFound = null;

function renderLink() {
  document.getElementById('link-body').innerHTML = `
    <div class="onboard-card">
      <div class="ob-icon">🔗</div>
      <div class="ob-title">Link your child's account</div>
      <div class="ob-sub">Your child needs to generate a link code from their hAIsir profile. Enter it below to connect their account to yours.</div>

      <div class="ob-input-wrap">
        <label class="ob-label">Enter link code</label>
        <input class="ob-input" id="link-input" type="text" placeholder="e.g. ARJUN-2026" oninput="checkLinkCode(this.value)" />
        <div id="link-msg" style="margin-top:6px;"></div>
      </div>

      <button class="ob-btn" id="link-btn" disabled onclick="confirmLink()">Link account</button>

      <div class="ob-divider"><div class="ob-line"></div>How does this work?<div class="ob-line"></div></div>

      <div class="ob-how">
        <strong>Step 1:</strong> Your child opens hAIsir and goes to their Profile.<br><br>
        <strong>Step 2:</strong> They tap "Generate parent code" — a unique code is created.<br><br>
        <strong>Step 3:</strong> They share the code with you (message, WhatsApp, etc.).<br><br>
        <strong>Step 4:</strong> Enter the code above to link your accounts. You can then see their progress any time.
      </div>
    </div>`;
}

function checkLinkCode(v) {
  const msg = document.getElementById('link-msg');
  const btn = document.getElementById('link-btn');
  v = v.toUpperCase().trim();
  const found = VALID_CODES[v];
  if (!v) { msg.innerHTML=''; btn.disabled=true; linkFound=null; return; }
  if (found) {
    msg.innerHTML=`<div class="ob-msg ob-msg-ok">✓ Found: ${found.name} · Grade ${found.grade} · ${found.school}</div>`;
    btn.disabled = false; linkFound = found;
  } else {
    msg.innerHTML='<div class="ob-msg ob-msg-err">Code not recognised. Ask your child to check their profile.</div>';
    btn.disabled = true; linkFound = null;
  }
}

function confirmLink() {
  if (!linkFound) return;
  showToast(`${linkFound.name}'s account linked successfully!`);
  setTimeout(() => goHome(), 800);
}

/* ═══════════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════════ */
let tt;
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(tt); tt=setTimeout(()=>t.classList.remove('show'),2400);
}

function sendMsg(id, name) {
  const inp = document.getElementById('msg-'+id);
  if (!inp?.value.trim()) return;
  showToast(`Message sent to ${name}`);
  inp.value='';
}

/* INIT */
function renderHome() {
  buildChildStrip('home-child-strip');
  renderCurrentTab();
}
renderHome();
</script>
</body>
</html>
